spring.application.name=quickbite-backend
server.port=5000

# MySQL Configuration
# Using 127.0.0.1 to avoid IPv6 localhost issues
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/quickbite_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Sahu@177
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.show-sql=true
# create-drop will drop tables on shutdown. switch to 'update' to keep data.
# using 'create' for now to ensure clean schema on startup.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Email Configuration (using environment variables)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER}
spring.mail.password=${EMAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Custom Properties
jwt.secret=${JWT_SECRET:quickbite2024secretkeyforjwtauthentication}
jwt.expiration=86400000

